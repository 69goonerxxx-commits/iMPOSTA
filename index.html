<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0C0808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IMPOSTA">
<title>IMPOSTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#0C0808;--s1:#181010;--s2:#201515;--s3:#2C1C1C;
  --glift:linear-gradient(180deg,#1E1414 0%,#151010 100%);
  --gold:#E8B84B;--gd:rgba(232,184,75,.13);
  --red:#C63535;--rd:rgba(198,53,53,.13);
  --blue:#4A8FD4;--bd:rgba(74,143,212,.11);
  --txt:#F2ECE4;--t2:#9A8878;--t3:#6A5848;
  --bdr:rgba(242,236,228,.10);--bdr2:rgba(242,236,228,.20);
  --fd:'Bebas Neue',sans-serif;
  --fb:'DM Sans',-apple-system,sans-serif;
  --r:12px;--rl:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--txt);font-family:var(--fb);font-size:15px;line-height:1.5}
#app{height:100%;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.scr{min-height:100%;padding:52px 20px 44px;max-width:440px;margin:0 auto;display:flex;flex-direction:column}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 20px;border:none;border-radius:var(--r);font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .12s,transform .1s;-webkit-user-select:none;user-select:none;min-height:52px;text-decoration:none}
.btn:active{opacity:.72;transform:scale(.97)}
.btn:disabled{opacity:.28;pointer-events:none}
.btn-gold{background:var(--gold);color:#0C0808;box-shadow:0 2px 20px rgba(232,184,75,.18)}
.btn-red{background:var(--red);color:#fff}
.btn-surf{background:var(--s2);color:var(--txt);border:1px solid var(--bdr2)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--bdr)}
.btn-sm{padding:10px 16px;font-size:13px;min-height:40px}

/* Input */
.inp{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r);padding:14px 16px;color:var(--txt);font-family:var(--fb);font-size:15px;outline:none;min-height:52px}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--t3)}

/* Back */
.bk{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--t2);font-family:var(--fb);font-size:14px;cursor:pointer;padding:0;margin-bottom:24px;-webkit-user-select:none;user-select:none}
.bk:active{opacity:.6}

/* Screen header */
.sh{font-family:var(--fd);font-size:40px;line-height:1;letter-spacing:.03em;margin-bottom:6px}
.ss{font-size:13px;color:var(--t2);margin-bottom:28px}
.sec-h{font-family:var(--fd);font-size:24px;letter-spacing:.02em;margin:32px 0 12px}

/* Quick-load group chips */
.gchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.gchip{flex:0 0 auto}

/* Stacks / spacing */
.stk{display:flex;flex-direction:column}
.g8{gap:8px}.g12{gap:12px}.g16{gap:16px}.g20{gap:20px}
.sp{flex:1}

/* Step indicator */
.steps{display:flex;gap:6px;margin-bottom:28px}
.step{height:3px;flex:1;border-radius:2px;background:var(--bdr2)}
.step.on{background:var(--gold);box-shadow:0 0 8px rgba(232,184,75,.4)}.step.dn{background:var(--gold);opacity:.35}

/* Icon button */
.ico{width:34px;height:34px;border-radius:50%;background:var(--s3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:13px;flex-shrink:0;-webkit-user-select:none;user-select:none}
.ico:active{opacity:.6}

/* Dot / avatar */
.dot{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);color:#0C0808;font-weight:700}
.dot-lg{width:38px;height:38px;font-size:18px}
.dot-md{width:32px;height:32px;font-size:15px}
.dot-sm{width:28px;height:28px;font-size:13px}
.dot-v{width:40px;height:40px;font-size:20px}

/* Color swatches */
.col-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:10px}
.sw{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
.sw.sel{border-color:white;transform:scale(1.15)}
.sw:active{transform:scale(.9)}

/* Edit box */
.ebox{background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r);padding:16px;margin-top:6px}

/* Notice */
.note{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--t2);line-height:1.5}

/* Divider */
.div{height:1px;background:var(--bdr);margin:16px 0}

/* HOME */
.logo{font-family:var(--fd);font-size:76px;line-height:1;letter-spacing:.05em;color:var(--gold);text-shadow:0 0 60px rgba(232,184,75,.3)}
.tagline{font-size:12px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin:6px 0 38px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.mc{background:var(--glift);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px 16px 18px;cursor:pointer;transition:background .12s,transform .1s;-webkit-user-select:none;user-select:none;display:flex;flex-direction:column;gap:8px}
.mc:active{transform:scale(.96);background:var(--s2)}
.mc-ico{font-size:26px}
.mc-name{font-family:var(--fd);font-size:24px;letter-spacing:.03em}
.mc-desc{font-size:12px;color:var(--t3);line-height:1.4}
.hbtns{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* PROFILES */
.pi{display:flex;align-items:center;gap:14px;background:var(--glift);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;cursor:pointer;-webkit-user-select:none;user-select:none}
.pi:active{background:var(--s2)}
.p-name{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-score{font-size:12px;color:var(--t3)}
.add-chip{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px dashed var(--bdr2);border-radius:var(--r);padding:14px 16px;cursor:pointer;color:var(--t2);font-size:14px;font-weight:500;-webkit-user-select:none;user-select:none;width:100%}
.add-chip:active{background:var(--s2)}

/* SETUP – player select */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pchip{display:flex;align-items:center;gap:10px;background:var(--glift);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none}
.pchip.on{border-color:var(--gold);background:var(--gd);box-shadow:0 0 0 1px rgba(232,184,75,.1) inset}
.pchip:active{transform:scale(.96)}
.pchip-name{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pchip-ck{font-size:13px;color:var(--gold)}
.add-p{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--s1);border:1px dashed var(--bdr2);border-radius:var(--r);padding:12px 14px;cursor:pointer;color:var(--t3);font-size:13px;-webkit-user-select:none;user-select:none}
.add-p:active{background:var(--s2)}

/* SETUP – roles */
.rrow{display:flex;align-items:center;justify-content:space-between;background:var(--glift);border:1px solid var(--bdr);border-radius:var(--r);padding:16px}
.rrow.disabled{opacity:.45}
.rlbl{font-size:15px;font-weight:500}
.rsub{font-size:12px;color:var(--t3);margin-top:2px}
.sctrl{display:flex;align-items:center;gap:14px}
.sbtn{width:36px;height:36px;border-radius:50%;background:var(--s3);border:none;color:var(--txt);font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}
.sbtn:active{opacity:.6}.sbtn:disabled{opacity:.22;pointer-events:none}
.sval{font-family:var(--fd);font-size:28px;letter-spacing:.02em;min-width:22px;text-align:center}
.tog{position:relative;width:46px;height:26px;flex-shrink:0}
.tog input{display:none}
.ttrack{position:absolute;inset:0;border-radius:13px;background:var(--s3);cursor:pointer;transition:background .2s}
.ttrack::after{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;border-radius:50%;background:var(--t3);transition:transform .2s,background .2s}
input:checked+.ttrack{background:var(--gold)}
input:checked+.ttrack::after{transform:translateX(20px);background:#0C0808}

/* SETUP – category */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ccard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--glift);border:2px solid var(--bdr);border-radius:var(--r);padding:20px 12px;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none;text-align:center}
.ccard.on{border-color:var(--gold);background:var(--gd);box-shadow:0 0 0 1px rgba(232,184,75,.1) inset}
.ccard:active{transform:scale(.96)}
.cico{font-size:26px}.cname{font-size:13px;font-weight:600}

/* Randomizer badge */
.rbadge{display:flex;align-items:center;gap:14px;padding:18px;background:linear-gradient(160deg,rgba(232,184,75,.16) 0%,rgba(232,184,75,.09) 100%);border:1px solid rgba(232,184,75,.22);border-radius:var(--r);margin-bottom:16px}

/* ASSIGNMENT */
.ascr{min-height:100%;display:flex;flex-direction:column;align-items:center;padding:52px 24px 44px;max-width:440px;margin:0 auto}
.plbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.pname{font-family:var(--fd);font-size:52px;letter-spacing:.03em;margin-bottom:28px;text-align:center;line-height:1}
.cwrap{perspective:1200px;width:min(268px,74vw);height:min(400px,calc(74vw*1.493));margin-bottom:28px;flex-shrink:0}
.flip{width:100%;height:100%;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,.2,.2,1);position:relative;cursor:pointer}
.flip.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:24px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.fback{background:var(--s2);border:1px solid var(--bdr2)}
.flogo{font-family:var(--fd);font-size:44px;letter-spacing:.07em;color:var(--gold);opacity:.3}
.fhint{font-size:10px;color:var(--t3);margin-top:10px;letter-spacing:.09em;text-transform:uppercase}
.ffront{transform:rotateY(180deg)}
.fciv{background:linear-gradient(155deg,#112030 0%,#09131E 100%);border:1px solid rgba(74,143,212,.22)}
.fimp{background:linear-gradient(155deg,#270C0C 0%,#160606 100%);border:1px solid rgba(198,53,53,.28)}
.fwg{background:linear-gradient(155deg,#1C1616 0%,#120F0F 100%);border:1px solid rgba(242,236,228,.09)}
.clbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.crole{font-family:var(--fd);font-size:48px;letter-spacing:.04em;line-height:1;margin-bottom:16px;text-align:center}
.fciv .crole{color:var(--blue)}.fimp .crole{color:var(--red)}.fwg .crole{color:var(--t2)}
.cdiv{width:36px;height:1px;background:var(--bdr2);margin:0 0 12px}
.cwlbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.cword{font-family:var(--fd);font-size:28px;letter-spacing:.04em;text-align:center}
.cnone{font-size:13px;color:var(--t3)}
.ctag{font-size:12px;color:var(--gold);text-align:center;max-width:220px;line-height:1.4}
.done-btn{opacity:0;transition:opacity .3s;pointer-events:none}

/* GAME INFO */
.icard{background:var(--glift);border:1px solid var(--bdr);border-radius:var(--rl);padding:24px}
.tinput{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;color:var(--txt);font-family:var(--fb);font-size:14px;padding:10px 12px;box-sizing:border-box;outline:none;}
.tinput:focus{border-color:var(--gold)}
.irow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.irow:last-child{border-bottom:none}
.ik{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.iv{font-family:var(--fd);font-size:22px;letter-spacing:.03em}
.iv.myst{letter-spacing:.22em;color:var(--t3)}

/* DISCUSSION */
.bigtxt{font-family:var(--fd);font-size:64px;letter-spacing:.03em;line-height:1;margin-bottom:6px}
.ppill{display:flex;align-items:center;gap:10px;background:var(--glift);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px}

/* VOTING */
.vitem{display:flex;align-items:center;gap:14px;background:var(--glift);border:2px solid var(--bdr);border-radius:var(--r);padding:15px 16px;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none}
.vitem.on{border-color:var(--red);background:var(--rd)}
.vitem:active{transform:scale(.97)}
.vname{font-size:15px;font-weight:600;flex:1}
.vx{color:var(--red);font-size:16px}

/* REVEAL */
.rscr{min-height:100%;display:flex;flex-direction:column;align-items:center;padding:52px 24px 44px;max-width:440px;margin:0 auto;text-align:center}
.rlbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.rname{font-family:var(--fd);font-size:44px;letter-spacing:.03em;margin-bottom:28px}
.rcard{width:min(252px,70vw);border-radius:24px;padding:30px 22px;display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
.rcard.rciv{background:linear-gradient(155deg,#112030 0%,#09131E 100%);border:1px solid rgba(74,143,212,.22)}
.rcard.rimp{background:linear-gradient(155deg,#270C0C 0%,#160606 100%);border:1px solid rgba(198,53,53,.28)}
.rcard.rwg{background:linear-gradient(155deg,#1C1616 0%,#120F0F 100%);border:1px solid rgba(242,236,228,.09)}
.rwas{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.rrole{font-family:var(--fd);font-size:46px;letter-spacing:.04em;line-height:1;margin-bottom:14px}
.rciv .rrole{color:var(--blue)}.rimp .rrole{color:var(--red)}.rwg .rrole{color:var(--t2)}
.rwlbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;margin-top:12px}
.rword{font-family:var(--fd);font-size:26px;letter-spacing:.04em}

/* WIN */
.wscr{min-height:100%;display:flex;flex-direction:column;align-items:center;padding:52px 20px 44px;max-width:440px;margin:0 auto}
.wbig{font-family:var(--fd);font-size:60px;letter-spacing:.04em;color:var(--gold);line-height:1;margin-bottom:6px;text-align:center}
.wsub{font-size:13px;color:var(--t3);margin-bottom:28px;text-align:center}
.witem{display:flex;align-items:center;gap:14px;background:var(--glift);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;width:100%}
.wname{font-size:15px;font-weight:600}
.wscore{font-size:12px;color:var(--t3)}
.wpts{margin-left:auto;font-family:var(--fd);font-size:24px;color:var(--gold)}

/* SCOREBOARD */
.scitem{display:flex;align-items:center;gap:14px;background:var(--glift);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px}
.scrank{font-family:var(--fd);font-size:24px;letter-spacing:.02em;color:var(--t3);min-width:28px}
.scrank.top{color:var(--gold)}
.scname{font-size:15px;font-weight:600}
.scpts{margin-left:auto;font-family:var(--fd);font-size:28px;letter-spacing:.02em}

@media (prefers-reduced-motion:reduce){.flip,.btn,.mc,.pchip,.vitem{transition:none}}

/* PWA update banner */
.update-banner{position:fixed;left:16px;right:16px;bottom:16px;background:var(--gold);color:var(--bg);font-family:var(--fb);font-weight:600;font-size:14px;text-align:center;padding:14px 16px;border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.4);cursor:pointer;display:none;z-index:9999;-webkit-user-select:none;user-select:none}
.update-banner:active{opacity:.8}
/* PWA install banner */
.install-banner{position:fixed;left:16px;right:16px;bottom:16px;background:var(--s2);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--fb);font-size:14px;padding:12px 14px;border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;z-index:9998;align-items:center;gap:10px;-webkit-user-select:none;user-select:none}
.install-banner.show{display:flex}
</style>
</head>
<body>
<div id="app"></div>
<div id="updateBanner" class="update-banner" onclick="location.reload()">↻ New version available — tap to refresh</div>
<div id="installBanner" class="install-banner">
  <span style="flex:1;font-weight:600">Add IMPOSTA to home screen</span>
  <button class="btn btn-gold btn-sm" style="width:auto;padding:10px 14px;white-space:nowrap;flex-shrink:0" onclick="doInstall()">Install</button>
  <button class="btn btn-ghost btn-sm" style="width:auto;padding:10px 12px;flex-shrink:0" onclick="dismissInstall()">✕</button>
</div>
<script>
// ── PWA INSTALL ──
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  const b = document.getElementById('installBanner');
  if (b) b.classList.add('show');
});
window.addEventListener('appinstalled', () => {
  deferredInstall = null;
  const b = document.getElementById('installBanner');
  if (b) b.classList.remove('show');
});
function doInstall() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(() => {
    deferredInstall = null;
    const b = document.getElementById('installBanner');
    if (b) b.classList.remove('show');
  });
}
function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
}

// ── COLORS ──
const COLORS=['#E8B84B','#C63535','#4A8FD4','#4CAF50','#9B59B6','#FF7043','#E91E8C','#00BCD4','#26A69A','#FF5722','#7986CB','#A1887F'];

// ── WORDS ──
const W={
  classic:{
    animals:[{w:'Dog',d:'Fox'},{w:'Cat',d:'Lynx'},{w:'Elephant',d:'Mammoth'},{w:'Lion',d:'Cheetah'},{w:'Rabbit',d:'Hamster'},{w:'Shark',d:'Barracuda'},{w:'Eagle',d:'Falcon'},{w:'Snake',d:'Lizard'},{w:'Frog',d:'Salamander'},{w:'Butterfly',d:'Moth'},{w:'Horse',d:'Zebra'},{w:'Cow',d:'Bison'},{w:'Penguin',d:'Puffin'},{w:'Gorilla',d:'Chimpanzee'},{w:'Crocodile',d:'Alligator'},{w:'Parrot',d:'Macaw'},{w:'Octopus',d:'Squid'},{w:'Turtle',d:'Tortoise'},{w:'Whale',d:'Manatee'},{w:'Bat',d:'Flying Fox'}],

const SK={p:'imposta_p',u:'imposta_u',g:'imposta_g',lg:'imposta_lastgroup',cp:'imposta_cp',hist:'imposta_hist'};
function gP(){try{return JSON.parse(localStorage.getItem(SK.p))||[];}catch{return[];}}
function sP(a){localStorage.setItem(SK.p,JSON.stringify(a));}
function gG(){try{return JSON.parse(localStorage.getItem(SK.g))||[];}catch{return[];}}
function sG(a){localStorage.setItem(SK.g,JSON.stringify(a));}
function gLG(){return localStorage.getItem(SK.lg)||null;}
function sLG(id){localStorage.setItem(SK.lg,id);}
function gUsed(k){try{const a=JSON.parse(localStorage.getItem(SK.u))||{};return a[k]||[];}catch{return[];}}
function addUsed(k,i){try{const a=JSON.parse(localStorage.getItem(SK.u))||{};a[k]=[...(a[k]||[]),i];localStorage.setItem(SK.u,JSON.stringify(a));}catch{}}
function resetUsed(k){try{const a=JSON.parse(localStorage.getItem(SK.u))||{};a[k]=[];localStorage.setItem(SK.u,JSON.stringify(a));}catch{}}
function addScore(id,pts){const ps=gP();const p=ps.find(x=>x.id===id);if(p){p.score=(p.score||0)+pts;sP(ps);}}
function gCP(){try{return JSON.parse(localStorage.getItem(SK.cp))||[];}catch{return[];}}
function sCP(a){localStorage.setItem(SK.cp,JSON.stringify(a));}
function gHist(){try{return JSON.parse(localStorage.getItem(SK.hist))||[];}catch{return[];}}
function sHist(a){localStorage.setItem(SK.hist,JSON.stringify(a.slice(-20)));}
function saveHistory(res){

}

function uid(){return Math.random().toString(36).slice(2,10);}
function vib(pattern){if(navigator.vibrate)navigator.vibrate(pattern);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function ini(n){return(n||'?')[0].toUpperCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gProf(id){return gP().find(p=>p.id===id);}

function pickWord(mode,cat){
  const pool=W[mode]&&W[mode][cat];if(!pool)return null;
  const k=`${mode}_${cat}`;let used=gUsed(k);
  let avail=pool.map((_,i)=>i).filter(i=>!used.includes(i));
  if(!avail.length){resetUsed(k);avail=pool.map((_,i)=>i);}
  const i=avail[Math.floor(Math.random()*avail.length)];
  addUsed(k,i);return pool[i];
}
function pickPrompt(){
  const useAll=!SS.cat||SS.cat==='all';
  const isCustom=SS.cat==='custom';
  if(isCustom){
    const cp=gCP();if(!cp.length)return{b:'Describe your day',t:'Describe a day you would never want to have',cat:'custom'};
    const k='prompts_custom';let used=gUsed(k);
    let avail=cp.map((_,i)=>i).filter(i=>!used.includes(i));
    if(!avail.length){resetUsed(k);avail=cp.map((_,i)=>i);}
    const i=avail[Math.floor(Math.random()*avail.length)];
    addUsed(k,i);return{...cp[i],cat:'custom'};
  }
  const k=useAll?'prompts':`prompts_${SS.cat}`;
  const eligible=useAll?PROMPTS.map((_,i)=>i):PROMPTS.map((p,i)=>p.cat===SS.cat?i:-1).filter(i=>i>=0);
  let used=gUsed(k);
  let avail=eligible.filter(i=>!used.includes(i));
  if(!avail.length){resetUsed(k);avail=eligible;}
  const i=avail[Math.floor(Math.random()*avail.length)];
  addUsed(k,i);return PROMPTS[i];
}

// ── WIN CHECK ──
function checkWin(votedId,wgResult){
  const{alive,roles,initImp,allImp,initN}=GS;
  const gr=id=>roles.find(r=>r.pid===id);
  const ar=alive.map(gr).filter(Boolean);
  const ai=ar.filter(r=>r.role==='impostor');
  const aw=ar.filter(r=>r.role==='whiteguy');
  const vr=gr(votedId);

  if(vr&&vr.role==='whiteguy'&&wgResult==='correct'){
    return{type:'wg_win',winners:[votedId,...ai.map(r=>r.pid)],wgId:votedId};}

  if(ai.length===0&&aw.length===0){
    if(initImp===0){
      return alive.length<=2?{type:'surv_win',winners:[...alive,...(GS.ghostVoters||[])]}:null;
    }
    return{type:'civ_win',winners:[...alive,...(GS.ghostVoters||[])]};}

  if(initImp===0){
    return alive.length<=2?{type:'surv_win',winners:[...alive,...(GS.ghostVoters||[])]}:null;}

  if(initImp===1&&!allImp){
    if(ai.length===1&&vr&&vr.role==='civilian'){
      return{type:'solo_win',winners:[ai[0].pid],big:initN>=5};}}

  if(initImp>=2||allImp){
    if(alive.length===2&&ai.length>=1){
      return{type:'imp_win',winners:ai.map(r=>r.pid)};}}

  return null;
}

function applyScores(res){
  if(!res)return;
  switch(res.type){
    case'civ_win':res.winners.forEach(id=>addScore(id,1));break;
    case'solo_win':addScore(res.winners[0],res.big?3:1);break;
    case'imp_win':res.winners.forEach(id=>addScore(id,1));break;
    case'wg_win':addScore(res.wgId,3);res.winners.filter(id=>id!==res.wgId).forEach(id=>addScore(id,1));break;
    case'surv_win':res.winners.forEach(id=>addScore(id,1));break;
  }
}

function applyStats(res){
  if(!res)return;
  const ps=gP();
  (GS.players||[]).forEach(id=>{
    const p=ps.find(x=>x.id===id);if(!p)return;
    if(p.wins===undefined)p.wins=0;
    if(p.losses===undefined)p.losses=0;
    if(!p.roleStats)p.roleStats={civilian:{wins:0,games:0},impostor:{wins:0,games:0},whiteguy:{wins:0,games:0}};
    const roleObj=GS.roles.find(r=>r.pid===id);
    const role=roleObj?roleObj.role:'civilian';
    if(!p.roleStats[role])p.roleStats[role]={wins:0,games:0};
    const won=res.winners.includes(id);
    if(won){p.wins++;p.roleStats[role].wins++;}else{p.losses++;}
    p.roleStats[role].games++;
  });
  sP(ps);
  saveHistory(res);
}

function compressImage(file){
  return new Promise(resolve=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const sz=200;const c=document.createElement('canvas');c.width=sz;c.height=sz;
      const ctx=c.getContext('2d');const s=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,sz,sz);
      URL.revokeObjectURL(url);resolve(c.toDataURL('image/jpeg',.75));
    };img.src=url;
  });
}

  const rName=isWG?'White Guy':role[0].toUpperCase()+role.slice(1);
  const fCls=isBlind?'fwg':(role==='civilian'?'fciv':role==='impostor'?'fimp':'fwg');
  let cardInner='';
  if(isBlind){
    cardInner=`<div class="cdiv"></div><div class="cwlbl">Your word</div><div class="cword">${esc(cur.word||'')}</div>`;
  }else{
    let wordSec='';
    if(role==='civilian'||role==='impostor'){
      wordSec=`<div class="cdiv"></div><div class="cwlbl">${role==='impostor'?(GS.pd?'Your twist':'Your decoy'):(GS.pd?'The prompt':'The word')}</div><div class="cword">${esc(cur.word||'')}</div>`;
    }else{
      wordSec=`<div class="cdiv"></div><div class="cnone">— no word —</div>`;
    }
    let tagSec='';
    if(cur.tag==='mime')tagSec=`<div class="cdiv"></div><div class="ctag">🎭 You're also the Mime — act it out, never say the word.</div>`;
    else if(cur.tag==='ghost')tagSec=`<div class="cdiv"></div><div class="ctag">👻 You're also the Ghost — if voted out, you still get a vote.</div>`;
    cardInner=`<div class="clbl">You are</div><div class="crole">${rName}</div>${wordSec}${tagSec}`;
  }
  return`<div class="ascr">
    <div class="plbl">Pass to</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:20px">
      ${avatar(p,'dot-lg')}
      <div class="pname">${esc(p?p.name:'?')}</div>
    </div>
    <div class="cwrap">
      <div class="flip" id="fc" onclick="revealCard()">
        <div class="face fback">
          <div class="flogo">IMPOSTA</div>
          <div class="fhint">Tap to reveal</div>
        </div>
        <div class="face ffront ${fCls}">
          ${cardInner}
        </div>
      </div>
    </div>
    <button class="btn btn-gold done-btn" onclick="advAssign()">Done →</button>
  </div>`;
}

function rInfo(){
  const{mode,roles,rand,initImp,allImp}=GS;
  const mLabel={classic:'Classic',prompt:'Prompt',drawing:'Drawing',randomizer:'Randomizer'}[mode]||mode;
  const impN=roles.filter(r=>r.role==='impostor').length;
  const wgN=roles.filter(r=>r.role==='whiteguy').length;
  const civN=roles.filter(r=>r.role==='civilian').length;
  const roleRows=rand
    ?`<div class="irow"><div class="ik">Roles</div><div class="iv myst">??? ??? ???</div></div>`
    :`<div class="irow"><div class="ik">Civilians</div><div class="iv">${civN}</div></div>
      <div class="irow"><div class="ik">Impostors</div><div class="iv" style="color:var(--red)">${impN}</div></div>
      ${wgN?`<div class="irow"><div class="ik">White Guy</div><div class="iv" style="color:var(--t2)">1</div></div>`:''}`;
  return`<div class="scr">
    <div class="sh">Game Info</div>
    <div class="ss">Share this before you start discussing</div>
    <div class="icard" style="margin-bottom:16px">
      <div class="irow"><div class="ik">Mode</div><div class="iv">${mLabel}</div></div>
      <div class="irow"><div class="ik">Players</div><div class="iv">${roles.length}</div></div>
      ${roleRows}
    </div>
    ${mode==='drawing'?`<div class="note" style="margin-bottom:16px">Reveal the word one detail at a time each round — don't show it outright.</div>`:''}
    <div class="sp"></div>
    <button class="btn btn-gold" onclick="nav('discussion')">Start →</button>
  </div>`;
}

function rDisc(){
  const{alive}=GS;
  const pills=alive.map(id=>{const p=gProf(id);return`<div class="ppill">${avatar(p,'dot-sm')}<div style="font-size:14px;font-weight:500">${esc(p?p.name:'?')}</div></div>`;}).join('');
  const ghosts=(GS.ghostVoters||[]);
  const ghostNote=ghosts.length?`<div style="font-size:12px;color:var(--t3);margin-bottom:16px;text-align:center">${ghosts.map(id=>{const p=gProf(id);return`👻 ${esc(p?p.name:'?')}`;}).join(' · ')} still ${ghosts.length===1?'votes':'vote'}</div>`:'';
  return`<div class="scr">
    <div class="bigtxt">DISCUSS</div>
    <div style="font-size:13px;color:var(--t3);margin-bottom:24px">${alive.length} remaining</div>
    <div class="stk g8" style="margin-bottom:24px">${pills}</div>
    ${ghostNote}
    <div class="sp"></div>
    <button class="btn btn-gold" onclick="GS.voteMode==='phone'?startPhoneVote():nav('voting')">Ready to Vote →</button>
  </div>`;
}

function rVote(){
  const{alive}=GS;
  const items=alive.map(id=>{const p=gProf(id);const on=voteTarget===id;return`<div class="vitem${on?' on':''}" onclick="selVote('${id}')">
    ${avatar(p,'dot-v')}
    <div class="vname">${esc(p?p.name:'?')}</div>
    ${on?`<div class="vx">✕</div>`:''}
  </div>`;}).join('');
  return`<div class="scr">
    <div class="sh">Vote</div>
    <div class="ss">Who's getting voted out?</div>
    <div class="stk g8" style="margin-bottom:20px">${items}</div>
    <div class="sp"></div>
    <button class="btn btn-red" ${voteTarget?'':'disabled'} onclick="confirmVote()">Confirm Vote</button>
  </div>`;
}

function rReveal(){
  const vid=pendingVoted;const re=GS.roles.find(r=>r.pid===vid);
  if(!re){nav('discussion');return'';}
  const p=gProf(vid);const{role,word}=re;
  const rName=role==='whiteguy'?'White Guy':role[0].toUpperCase()+role.slice(1);
  const rCls=role==='civilian'?'rciv':role==='impostor'?'rimp':'rwg';
  const isWG=role==='whiteguy';
  const win=!isWG?checkWin(vid):null;
  if(win)winRes=win;
  let wSec='';
  if(role==='civilian'||role==='impostor'){
    wSec=`<div class="rwlbl">${role==='impostor'?(GS.pd?'Their twist':'Their decoy'):(GS.pd?'The prompt':'The word')}</div><div class="rword">${esc(word||'')}</div>`;
  }else{
    wSec=`<div style="font-size:12px;color:var(--t3);margin-top:10px">Had no word</div>`;
  }
  if(re.tag==='ghost')wSec+=`<div class="ctag" style="margin-top:14px">👻 They were the Ghost — they still get a vote.</div>`;
  let action='';
  if(isWG)action=`<button class="btn btn-gold" onclick="nav('whiteguess')">They get to guess →</button>`;
  else if(win)action=`<button class="btn btn-gold" onclick="goToWin()">See Results →</button>`;
  else action=`<button class="btn btn-surf" onclick="nav('discussion')">Continue →</button>`;
  return`<div class="rscr">
    <div class="rlbl">Voted out</div>
    <div class="rname">${esc(p?p.name:'?')}</div>
    <div class="rcard ${rCls}">
      <div class="rwas">They were</div>
      <div class="rrole">${rName}</div>
      ${wSec}
    </div>
    ${action}
  </div>`;
}

function rWGGuess(){
  const p=gProf(pendingVoted);
  return`<div class="scr">
    <div class="sh">Last Chance</div>
    <div style="font-size:14px;color:var(--t2);margin-bottom:4px">${esc(p?p.name:'?')} was the White Guy.</div>
    <div style="font-size:13px;color:var(--t3);margin-bottom:28px">Guess the word to win — or go down with the ship.</div>
    <input class="inp" id="wgg" placeholder="Type your guess…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div style="margin-top:12px"></div>
    <button class="btn btn-gold wg-btn" onclick="submitGuess()">Confirm Guess</button>
    <div id="gr" style="display:none;text-align:center;margin-top:20px"></div>
    <div id="gc" style="display:none;margin-top:12px"></div>
  </div>`;
}

function rWin(){
  if(!winRes){nav('home');return'';}
  const ps=gP();const gp=id=>ps.find(p=>p.id===id);
  const titles={civ_win:'CIVILIANS WIN',solo_win:'IMPOSTOR WINS',imp_win:'IMPOSTORS WIN',wg_win:'WHITE GUY WINS',surv_win:'SURVIVORS WIN'};
  const subs={civ_win:'The impostors have been rooted out',solo_win:winRes.big?'Flawless — survived the whole way':'Survived the vote',imp_win:'Made it to the final two',wg_win:'Correct guess — and the impostors ride with it',surv_win:'No impostors — last two standing claimed it'};
  const pts={};
  switch(winRes.type){
    case'civ_win':winRes.winners.forEach(id=>pts[id]=1);break;
    case'solo_win':pts[winRes.winners[0]]=winRes.big?3:1;break;
    case'imp_win':winRes.winners.forEach(id=>pts[id]=1);break;
    case'wg_win':pts[winRes.wgId]=3;winRes.winners.filter(id=>id!==winRes.wgId).forEach(id=>pts[id]=1);break;
    case'surv_win':winRes.winners.forEach(id=>pts[id]=1);break;
  }
  const items=(winRes.winners||[]).map(id=>{const p=gp(id);return`<div class="witem">
    ${avatar(p,'dot-v')}
    <div><div class="wname">${esc(p?p.name:'?')}</div><div class="wscore">${p?p.score||0:0} pts total</div></div>
    <div class="wpts">+${pts[id]||0}</div>
  </div>`}).join('');
  const reveal=GS.roles.map(r=>{
    const p=gp(r.pid);
    const rName=r.role==='whiteguy'?'White Guy':r.role[0].toUpperCase()+r.role.slice(1);
    const rClr=r.role==='impostor'?'var(--red)':r.role==='whiteguy'?'var(--t2)':'var(--gold)';
    const wordText=r.role!=='whiteguy'?(r.word||''):'—';
    return`<div class="witem">
      ${avatar(p,'dot-v')}
      <div style="flex:1;min-width:0">
        <div class="wname">${esc(p?p.name:'?')}</div>
        <div style="font-size:12px;color:${rClr};font-weight:600">${rName}</div>
      </div>
      <div style="font-size:12px;color:var(--t2);text-align:right;max-width:140px;word-break:break-word">${esc(wordText)}</div>
    </div>`;
  }).join('');
  return`<div class="wscr">
    <div class="wbig">${titles[winRes.type]||'GAME OVER'}</div>
    <div class="wsub">${subs[winRes.type]||''}</div>
    <div class="stk g8" style="width:100%;margin-bottom:28px">${items}</div>
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;margin-bottom:10px;align-self:flex-start">Full Reveal</div>
    <div class="stk g8" style="width:100%;margin-bottom:28px">${reveal}</div>
    <div class="sp"></div>
    <div class="stk g8" style="width:100%">
      <button class="btn btn-gold" onclick="nav('scoreboard')">View Scoreboard</button>
      <button class="btn btn-gold" style="background:var(--s2);border:1px solid var(--gold);color:var(--gold)" onclick="quickRematch()">⚡ Rematch</button>
      <button class="btn btn-surf" onclick="playAgain()">Play Again</button>
      <button class="btn btn-ghost" onclick="nav('home')">Back to Home</button>
    </div>
  </div>`;
}

function rScore(){
  const ps=[...gP()].sort((a,b)=>(b.score||0)-(a.score||0));
  const items=ps.length===0
    ?`<div class="note">No scores yet. Play a game first.</div>`
    :ps.map((p,i)=>`<div class="scitem" onclick="openDetail('${p.id}')" style="cursor:pointer">
      <div class="scrank${i<3?' top':''}">${i+1}</div>
      ${avatar(p,'dot-lg')}
      <div style="flex:1;min-width:0">
        <div class="scname">${esc(p.name)}</div>
        <div style="font-size:12px;color:var(--t3)">${winrateStr(p)} win rate</div>
      </div>
      <div class="scpts">${p.score||0}</div>
    </div>`).join('');
  return`<div class="scr">
    <button class="bk" onclick="nav('home')">← Back</button>
    <div class="sh">Scoreboard</div>
    <div class="ss">Tap a player for stats</div>
    <div class="stk g8">${items}</div>
  </div>`;
}

function rProfDetail(){
  if(!detailId){nav('scoreboard');return'';}
  const p=gProf(detailId);if(!p){nav('scoreboard');return'';}
  const w=p.wins||0;const l=p.losses||0;const g=w+l;
  const wr=g?Math.round(w/g*100)+'%':'—';
  const rs=p.roleStats||{};
  const civ=rs.civilian||{wins:0,games:0};
  const imp=rs.impostor||{wins:0,games:0};
  const wg=rs.whiteguy||{wins:0,games:0};
  const rWR=r=>r.games?Math.round(r.wins/r.games*100)+'%':'—';
  const rRec=r=>r.games?`<span style="font-size:12px;color:var(--t3);font-family:var(--fb);margin-left:8px">${r.wins}/${r.games}</span>`:'';
  return`<div class="scr">
    <button class="bk" onclick="nav('scoreboard')">← Scoreboard</button>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px">
      ${avatar(p,'dot-lg')}
      <div><div style="font-size:18px;font-weight:600">${esc(p.name)}</div><div style="font-size:13px;color:var(--t3)">${p.score||0} pts total</div></div>
    </div>
    <div class="icard" style="margin-bottom:12px">
      <div style="text-align:center;padding:10px 0 16px">
        <div style="font-family:var(--fd);font-size:64px;line-height:1;letter-spacing:.03em">${wr}</div>
        <div style="font-size:12px;color:var(--t3);margin-top:4px">overall win rate</div>
      </div>
      <div class="irow"><div class="ik">Wins</div><div class="iv" style="color:var(--gold)">${w}</div></div>
      <div class="irow"><div class="ik">Losses</div><div class="iv">${l}</div></div>
      <div class="irow" style="border-bottom:none"><div class="ik">Games</div><div class="iv">${g}</div></div>
    </div>
    <div class="icard">
      <div class="irow"><div class="ik">Civilian</div><div class="iv">${rWR(civ)}${rRec(civ)}</div></div>
      <div class="irow"><div class="ik" style="color:var(--red)">Impostor</div><div class="iv">${rWR(imp)}${rRec(imp)}</div></div>
      <div class="irow" style="border-bottom:none"><div class="ik" style="color:var(--t2)">White Guy</div><div class="iv">${rWR(wg)}${rRec(wg)}</div></div>
    </div>
  </div>`;
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  render();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js',{scope:'./'}).then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            const b=document.getElementById('updateBanner');if(b)b.style.display='block';
          }
        });
      });
    }).catch(()=>{});
  }
});

// ── CUSTOM PROMPTS ──
let cpEdit={b:'',t:''};
function rManagePrompts(){
  const cp=gCP();
  const items=cp.length?cp.map((p,i)=>`<div class="icard" style="padding:14px 16px;margin-bottom:8px">
    <div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:4px">${esc(p.b)}</div>
    <div style="font-size:12px;color:var(--red);margin-bottom:10px">${esc(p.t)}</div>
    <button class="btn btn-ghost btn-sm" style="width:auto;padding:8px 14px;font-size:12px" onclick="delCP(${i})">Delete</button>
  </div>`).join(''):`<div style="color:var(--t3);font-size:13px;text-align:center;padding:32px 0">No custom prompts yet</div>`;
  return`<div class="scr">
    <button class="bk" onclick="nav('home')">← Back</button>
    <div class="sh">Custom Prompts</div>
    <div class="ss">Your own prompt pairs</div>
    <div class="icard" style="padding:16px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--t2);font-weight:600;margin-bottom:6px">Civilian prompt</div>
      <input id="cpB" class="tinput" placeholder="e.g. Describe your dream job" value="${esc(cpEdit.b)}" oninput="cpEdit.b=this.value" style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:6px">Impostor prompt</div>
      <input id="cpT" class="tinput" placeholder="e.g. Describe a job you'd quit in a day" value="${esc(cpEdit.t)}" oninput="cpEdit.t=this.value" style="margin-bottom:14px">
      <button class="btn btn-gold btn-sm" style="width:auto;padding:10px 18px" onclick="addCP()">Add →</button>
    </div>
    <div>${items}</div>
    <div class="sp"></div>
  </div>`;
}
function addCP(){
  const b=(cpEdit.b||'').trim();const t=(cpEdit.t||'').trim();
  if(!b||!t)return;
  const cp=gCP();cp.push({b,t});sCP(cp);
  cpEdit={b:'',t:''};render();
}
function delCP(i){const cp=gCP();cp.splice(i,1);sCP(cp);render();}

// ── HISTORY ──
function rHistory(){
  const hist=gHist().slice().reverse();
  const modeLabel={classic:'Classic',prompt:'Prompt',drawing:'Drawing',randomizer:'Randomizer'};
  const resultLabel={civ_win:'Civilians win',imp_win:'Impostor wins',solo_win:'Impostor wins',wg_win:'White Guy wins',surv_win:'Civilians survive'};
  const resultClr={civ_win:'var(--gold)',imp_win:'var(--red)',solo_win:'var(--red)',wg_win:'var(--t2)',surv_win:'var(--gold)'};
  if(!hist.length)return`<div class="scr"><button class="bk" onclick="nav('home')">← Back</button><div class="sh">History</div><div style="color:var(--t3);font-size:13px;text-align:center;padding:48px 0">No games played yet</div></div>`;
  const items=hist.map(h=>{
    const d=new Date(h.ts);
    const ds=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const ts=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const winners=h.winners.map(id=>{const p=gProf(id);return p?p.name:'?';}).join(', ');
    return`<div class="icard" style="padding:14px 16px;margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:13px;font-weight:700;color:var(--txt)">${modeLabel[h.mode]||h.mode}${h.cat&&h.cat!=='all'?' · '+h.cat:''}</div>
        <div style="font-size:11px;color:var(--t3)">${ds} ${ts}</div>
      </div>
      <div style="font-size:12px;font-weight:600;color:${resultClr[h.result]||'var(--t2)'};margin-bottom:4px">${resultLabel[h.result]||h.result}</div>
      ${winners?`<div style="font-size:12px;color:var(--t2)">${esc(winners)}</div>`:''}
      ${h.word?`<div style="font-size:11px;color:var(--t3);margin-top:2px">Word: ${esc(h.word)}</div>`:''}
    </div>`;
  }).join('');
  return`<div class="scr">
    <button class="bk" onclick="nav('home')">← Back</button>
    <div class="sh">History</div>
    <div class="ss">Last ${hist.length} game${hist.length!==1?'s':''}</div>
    ${items}
    <div class="sp"></div>
  </div>`;
}
</script>
</body>
</html>
